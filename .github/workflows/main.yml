# GitHub Actions workflow for Quarto to GitHub Pages deployment
# Build and deploy the Quarto site on every push to main

name: Publish Quarto Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        run: |
          curl -fsSL https://github.com/quarto-dev/quarto-cli/releases/download/v1.9.37/quarto-1.9.37-linux-amd64.tar.gz -o quarto.tar.gz
          tar -xzf quarto.tar.gz
          mv quarto-1.9.37 /opt/quarto
          echo "/opt/quarto/bin" >> $GITHUB_PATH

      - name: Render Quarto project
        run: quarto render --to html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4